<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/lockout-icon.svg" />
    <title>LOCKOUT Mobile Client</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="mobile-shell">
      <section class="mobile-panel">
        <p class="badge">LOCKOUT!</p>
        <h1>Join the Room</h1>
        <p class="subtitle">Stay on the same Wi-Fi as the host booth. Answers sync locally, and the phone buzzes when your response is locked in.</p>
        <div class="status" id="status">Connecting to the local LOCKOUT room...</div>
        <textarea id="answer" placeholder="Drop your answer here..."></textarea>
        <button id="submit">Lock It In</button>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
