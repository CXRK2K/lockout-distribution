name: static-checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-static:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate static distribution files
        run: node scripts/validate-static.mjs
